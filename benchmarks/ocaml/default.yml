name: OCaml Benchmark (Default)
author: André Brandão <https://github.com/brandao07>
description: OCaml benchmarks using native-code OCaml 5.4.0+dev0-2024-08-25

services:
  ocaml-container:
    image: ocaml/opam:ubuntu-24.04-ocaml-5.4
    setup-commands:
      - command: sh -lc "opam update && opam install -y ocamlfind re"
    command: sleep infinity

flow:
  - name: OCaml-Binary-Trees
    container: ocaml-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ocaml/binary-trees/build_in_tmp.sh
      - type: console
        command: /tmp/ocaml-binary-trees 21

  - name: OCaml-Fannkuch-Redux
    container: ocaml-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ocaml/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: /tmp/ocaml-fannkuch-redux 12

  - name: OCaml-K-Nucleotide
    container: ocaml-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ocaml/k-nucleotide/build_in_tmp.sh
      - type: console
        command: sh -c "/tmp/ocaml-k-nucleotide < /tmp/repo/inputs/fasta-2500000.txt"

  - name: OCaml-N-Body
    container: ocaml-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ocaml/n-body/build_in_tmp.sh
      - type: console
        command: /tmp/ocaml-n-body 50000000

  - name: OCaml-Regex-Redux
    container: ocaml-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ocaml/regex-redux/build_in_tmp.sh
      - type: console
        command: sh -c "/tmp/ocaml-regex-redux < /tmp/repo/inputs/fasta-5000000.txt"

  - name: OCaml-Spectral-Norm
    container: ocaml-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ocaml/spectral-norm/build_in_tmp.sh
      - type: console
        command: /tmp/ocaml-spectral-norm 5500
