name: NodeJS Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: NodeJS benchmarks using Node 25 Alpine

services:
  node-container:
    image: node:25-alpine3.21
    command: sleep infinity

flow:
  - name: NodeJS-Regex-Redux
    container: node-container
    commands:
      - type: console
        command: sh -c "node /tmp/repo/benchmarks/nodejs/regex-redux/main.js < /tmp/repo/inputs/fasta-100.txt"


