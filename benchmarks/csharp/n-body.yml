name: CSharp Benchmark (N-Body)
author: André Brandão <https://github.com/brandao07>
description: CSharp benchmarks using .NET SDK 9.0

services:
  csharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    command: sleep infinity

flow:
  - name: CSharp-N-Body
    container: csharp-container
    commands:
      - type: console
        command: bash -c "dotnet new console -n app --output /tmp/out --force && cp /tmp/repo/benchmarks/csharp/n-body/main.cs /tmp/out/Program.cs && cd /tmp/out && dotnet build -c Release"
      - type: console
        command: dotnet /tmp/out/bin/Release/net9.0/app.dll 50000000
