name: CSharp Benchmark (Fasta)
author: André Brandão <https://github.com/brandao07>
description: CSharp benchmarks using .NET SDK 9.0

services:
  csharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    command: sleep infinity

flow:
  - name: CSharp-Fasta
    container: csharp-container
    commands:
      - type: console
        command: bash -c "dotnet new console -n app --output /tmp/out --force && cp /tmp/repo/benchmarks/csharp/fasta/main.cs /tmp/out/Program.cs && cd /tmp/out && dotnet run -c Release -p:AllowUnsafeBlocks=true -- 2500000"