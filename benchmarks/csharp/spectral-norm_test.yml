name: CSharp Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: CSharp benchmarks using .NET SDK 9.0

services:
  csharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    setup-commands:
      - command: sh /tmp/repo/benchmarks/csharp/setup_dependencies.sh
    command: sleep infinity

flow:
  - name: CSharp-Spectral-Norm
    container: csharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/csharp/spectral-norm/build_in_tmp.sh
      - type: console
        command: /tmp/csharp-spectral-norm 500
