name: CSharp Benchmark (Binary-Trees)
author: André Brandão <https://github.com/brandao07>
description: CSharp benchmarks using .NET SDK 9.0

services:
  csharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    setup-commands:
      - command: sh /tmp/repo/benchmarks/csharp/setup_dependencies.sh
    command: sleep infinity

flow:
  - name: CSharp-Binary-Trees
    container: csharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/csharp/binary-trees/build_in_tmp.sh
      - type: console
        command: /tmp/csharp-binary-trees 6
