name: CSharp Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: CSharp benchmarks using .NET SDK 9.0

services:
  csharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    setup-commands:
      - command: sh /tmp/repo/benchmarks/csharp/setup_dependencies.sh
    command: sleep infinity

flow:
  - name: CSharp-Regex-Redux
    container: csharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/csharp/regex-redux/build_in_tmp.sh
      - type: console
        command: sh -c "/tmp/csharp-regex-redux 0 < /tmp/repo/inputs/fasta-100.txt"
