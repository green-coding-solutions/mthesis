  - name: CSharp-Spectral-Norm
    container: csharp-container
    commands:
      - type: console
        command: bash -c "dotnet new console -n app --output /tmp/out --force && cp /tmp/repo/benchmarks/csharp/spectral-norm/main.cs /tmp/out/Program.cs && cd /tmp/out && dotnet run -c Release -p:AllowUnsafeBlocks=true -- 12"
