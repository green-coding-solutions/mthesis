name: CSharp Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: CSharp benchmarks using .NET SDK 9.0

services:
  csharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    command: sleep infinity

flow:
  - name: CSharp-Spectral-Norm
    container: csharp-container
    commands:
      - type: console
        shell: bash
        command: dotnet new console -n app --output /tmp/out --force && cp /tmp/repo/benchmarks/csharp/spectral-norm/main.cs /tmp/out/Program.cs && cd /tmp/out && dotnet build -c Release -p:AllowUnsafeBlocks=true
      - type: console
        command: dotnet /tmp/out/bin/Release/net9.0/app.dll 5500
