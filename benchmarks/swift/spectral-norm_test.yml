name: Swift Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: Swift benchmarks using Swift 6.0.3 (runs on container architecture, e.g. arm64 on Apple Silicon)

services:
  swift-container:
    image: swift:6.0.3
    command: sleep infinity

flow:
  - name: Swift-Spectral-Norm
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/spectral-norm/main.swift -Ounchecked -wmo -o /tmp/spectralnorm.swift-3.swift_run
      - type: console
        command: /tmp/spectralnorm.swift-3.swift_run 500

