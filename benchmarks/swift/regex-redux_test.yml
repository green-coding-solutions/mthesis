name: Swift Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Swift benchmarks using Swift 6.0.3 (runs on container architecture, e.g. arm64 on Apple Silicon)

services:
  swift-container:
    image: swift:6.0.3
    setup-commands:
      - command: swiftc /tmp/repo/benchmarks/swift/regex-redux/main.swift -Ounchecked -wmo -o /tmp/regexredux.swift-4.swift_run
    command: sleep infinity

flow:
  - name: Swift-Regex-Redux
    container: swift-container
    commands:
      - type: console
        shell: sh
        command: /tmp/regexredux.swift-4.swift_run 0 < /tmp/repo/inputs/fasta-100.txt


