name: Swift Benchmark (Default)
author: André Brandão <https://github.com/brandao07>
description: Swift benchmarks using Swift 6.0.3 (runs on container architecture, e.g. arm64 on Apple Silicon)

services:
  swift-container:
    image: swift:6.0.3
    command: sleep infinity

flow:
  - name: Swift-Binary-Trees
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/binary-trees/main.swift -Ounchecked -wmo -o /tmp/swift-binary-trees
      - type: console
        command: /tmp/swift-binary-trees 21

  - name: Swift-Fannkuch-Redux
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/fannkuch-redux/main.swift -Ounchecked -wmo -o /tmp/swift-fannkuch-redux
      - type: console
        command: /tmp/swift-fannkuch-redux 12

  - name: Swift-K-Nucleotide
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/k-nucleotide/main.swift -Ounchecked -wmo -o /tmp/swift-k-nucleotide
      - type: console
        command: sh -c "/tmp/swift-k-nucleotide 0 < /tmp/repo/inputs/fasta-2500000.txt"

  - name: Swift-N-Body
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/n-body/main.swift -Ounchecked -wmo -o /tmp/nbody.swift-3.swift_run
      - type: console
        command: /tmp/nbody.swift-3.swift_run 50000000

  - name: Swift-Regex-Redux
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/regex-redux/main.swift -Ounchecked -wmo -o /tmp/regexredux.swift-4.swift_run
      - type: console
        command: sh -c "/tmp/regexredux.swift-4.swift_run 0 < /tmp/repo/inputs/fasta-5000000.txt"

  - name: Swift-Spectral-Norm
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/spectral-norm/main.swift -Ounchecked -wmo -o /tmp/spectralnorm.swift-3.swift_run
      - type: console
        command: /tmp/spectralnorm.swift-3.swift_run 5500
