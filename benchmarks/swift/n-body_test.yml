name: Swift Benchmark (N-Body)
author: André Brandão <https://github.com/brandao07>
description: Swift benchmarks using Swift 6.0.3 (runs on container architecture, e.g. arm64 on Apple Silicon)

services:
  swift-container:
    image: swift:6.0.3
    setup-commands:
      - command: swiftc /tmp/repo/benchmarks/swift/n-body/main.swift -Ounchecked -wmo -o /tmp/nbody.swift-3.swift_run
    command: sleep infinity

flow:
  - name: Swift-N-Body
    container: swift-container
    commands:
      - type: console
        command: /tmp/nbody.swift-3.swift_run 500


