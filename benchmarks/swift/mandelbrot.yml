name: Swift Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: Swift benchmarks using Swift 6.0.3 (runs on container architecture, e.g. arm64 on Apple Silicon)

services:
  swift-container:
    image: swift:6.0.3
    command: sleep infinity

flow:
  - name: Swift-Mandelbrot
    container: swift-container
    commands:
      - type: console
        command: swiftc /tmp/repo/benchmarks/swift/mandelbrot/main.swift -Ounchecked -wmo -o /tmp/swift-mandelbrot
      - type: console
        command: /tmp/swift-mandelbrot 16000
