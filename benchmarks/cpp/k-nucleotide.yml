name: CPP Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: CPP benchmarks using GCC 15.2.0

services:
  cpp-container:
    image: gcc:15.2.0
    setup-commands:
      - shell: bash
        command: apt-get update && apt-get install -y --fix-missing libboost-dev && rm -rf /var/lib/apt/lists/*
    command: sleep infinity

flow:
  - name: CPP-K-Nucleotide
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -O3 -fomit-frame-pointer -std=c++17 -march=native /tmp/repo/benchmarks/cpp/k-nucleotide/main.cpp -o /tmp/main
      - type: console
        shell: sh
        command: /tmp/main < /tmp/repo/inputs/fasta-2500000.txt


