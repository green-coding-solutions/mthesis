name: CPP Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: CPP benchmarks using GCC 15.2.0

services:
  cpp-container:
    image: gcc:15.2.0
    setup-commands:
      - shell: bash
        command: apt-get update && apt-get install -y --fix-missing libboost-dev && rm -rf /var/lib/apt/lists/*
    command: sleep infinity

flow:
  - name: CPP-Mandelbrot
    container: cpp-container
    commands:
      - type: console
        command: g++ -O3 -march=native -fopenmp /tmp/repo/benchmarks/cpp/mandelbrot/main.cpp -o /tmp/main
      - type: console
        command: /tmp/main 16000
