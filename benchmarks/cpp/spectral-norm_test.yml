name: CPP Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: CPP benchmarks using GCC 15.2.0

services:
  cpp-container:
    image: gcc:15.2.0
    setup-commands:
      - command: bash -c "apt-get update && apt-get install -y --fix-missing libboost-dev && rm -rf /var/lib/apt/lists/*"
    command: sleep infinity

flow:
  - name: CPP-Spectral-Norm
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -Wall -O3 -fomit-frame-pointer -march=native -fopenmp /tmp/repo/benchmarks/cpp/spectral-norm/main.cpp -o /tmp/main 
      - type: console
        command: /tmp/main 500

