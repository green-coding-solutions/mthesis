name: CPP Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: CPP benchmarks using GCC 15.2.0

services:
  cpp-container:
    image: gcc:15.2.0
    setup-commands:
      - shell: bash
        command: apt-get update && apt-get install -y --fix-missing libboost-dev && rm -rf /var/lib/apt/lists/*
      - command: g++ -pipe -Wall -O3 -fomit-frame-pointer -march=native /tmp/repo/benchmarks/cpp/regex-redux/main.cpp -o /tmp/main -lpcre2-8
    command: sleep infinity

flow:
  - name: CPP-Regex-Redux
    container: cpp-container
    commands:
      - type: console
        shell: sh
        command: /tmp/main < /tmp/repo/inputs/fasta-5000000.txt


