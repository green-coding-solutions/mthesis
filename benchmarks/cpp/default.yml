name: CPP Benchmark (Default)
author: André Brandão <https://github.com/brandao07>
description: CPP benchmarks using GCC 15.2.0

services:
  cpp-container:
    image: gcc:15.2.0
    setup-commands:
      - command: bash -c "apt-get update && apt-get install -y --fix-missing libboost-dev && rm -rf /var/lib/apt/lists/*"
    command: sleep infinity

flow:
  - name: CPP-Binary-Trees
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -O3 -fomit-frame-pointer -march=native /tmp/repo/benchmarks/cpp/binary-trees/main.cpp -o /tmp/main
      - type: console
        command: /tmp/main 21

  - name: CPP-Fannkuch-Redux
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -O3 -fomit-frame-pointer -march=native /tmp/repo/benchmarks/cpp/fannkuch-redux/main.cpp -o /tmp/main
      - type: console
        command: /tmp/main 12

  - name: CPP-K-Nucleotide
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -O3 -fomit-frame-pointer -std=c++17 -march=native /tmp/repo/benchmarks/cpp/k-nucleotide/main.cpp -o /tmp/main
      - type: console
        command: sh -c "/tmp/main < /tmp/repo/inputs/fasta-2500000.txt"

  - name: CPP-N-Body
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -Wall -O3 -fomit-frame-pointer -march=native /tmp/repo/benchmarks/cpp/n-body/main.cpp -o /tmp/main
      - type: console
        command: /tmp/main 50000000

  - name: CPP-Regex-Redux
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -Wall -O3 -fomit-frame-pointer -march=native /tmp/repo/benchmarks/cpp/regex-redux/main.cpp -o /tmp/main -lpcre2-8
      - type: console
        command: sh -c "/tmp/main < /tmp/repo/inputs/fasta-2500000.txt"

  - name: CPP-Spectral-Norm
    container: cpp-container
    commands:
      - type: console
        command: g++ -pipe -Wall -O3 -fomit-frame-pointer -march=native -fopenmp /tmp/repo/benchmarks/cpp/spectral-norm/main.cpp -o /tmp/main 
      - type: console
        command: /tmp/main 5500
