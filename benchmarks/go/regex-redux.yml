name: Go Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Go benchmarks using Golang 1.25 Alpine

services:
  go-container:
    image: golang:1.25-alpine
    command: sleep infinity

flow:
  - name: Go-Regex-Redux
    container: go-container
    commands:
      - type: console
        command: go build -o /tmp/go-regex-redux /tmp/repo/benchmarks/go/regex-redux/main.go
      - type: console
        shell: sh
        command: /tmp/go-regex-redux < /tmp/repo/inputs/fasta-5000000.txt


