name: Go Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Go benchmarks using Golang 1.25 Alpine

services:
  go-container:
    image: golang:1.25-alpine
    setup-commands:
      - command: go build -o /tmp/go-fannkuch-redux /tmp/repo/benchmarks/go/fannkuch-redux/main.go
    command: sleep infinity

flow:
  - name: Go-Fannkuch-Redux
    container: go-container
    commands:
      - type: console
        command: /tmp/go-fannkuch-redux 6


