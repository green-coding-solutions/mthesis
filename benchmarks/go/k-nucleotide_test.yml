name: Go Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Go benchmarks using Golang 1.25 Alpine

services:
  go-container:
    image: golang:1.25-alpine
    setup-commands:
      - command: go build -o /tmp/go-k-nucleotide /tmp/repo/benchmarks/go/k-nucleotide/main.go
    command: sleep infinity

flow:
  - name: Go-K-Nucleotide
    container: go-container
    commands:
      - type: console
        shell: sh
        command: /tmp/go-k-nucleotide < /tmp/repo/inputs/fasta-100.txt


