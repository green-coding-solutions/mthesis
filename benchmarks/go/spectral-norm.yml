name: Go Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: Go benchmarks using Golang 1.25 Alpine

services:
  go-container:
    image: golang:1.25-alpine
    command: sleep infinity

flow:
  - name: Go-Spectral-Norm
    container: go-container
    commands:
      - type: console
        command: sh -c "go build -o /tmp/go-spectral-norm /tmp/repo/benchmarks/go/spectral-norm/main.go"
      - type: console
        command: /tmp/go-spectral-norm 5500

