name: Lua Benchmark (Fasta)
author: André Brandão <https://github.com/brandao07>
description: Lua benchmarks using Lua 5.5 + LuaRocks Alpine 3.22

services:
  lua-container:
    image: nickblah/lua:5.5-luarocks-alpine3.22
    setup-commands:
      - command: sh /tmp/repo/benchmarks/lua/fasta/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Lua-Fasta
    container: lua-container
    commands:
      - type: console
        command: lua /tmp/lua-build/fasta/fasta.lua-2.lua_run 100
