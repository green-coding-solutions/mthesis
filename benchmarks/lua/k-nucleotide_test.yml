name: Lua Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Lua benchmarks using Lua 5.5 + LuaRocks Alpine 3.22

services:
  lua-container:
    image: nickblah/lua:5.5-luarocks-alpine3.22
    command: sleep infinity

flow:
  - name: Lua-K-Nucleotide
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/k-nucleotide/build_in_tmp.sh
      - type: console
        shell: sh
        command: lua /tmp/lua-build/k-nucleotide/knucleotide.lua-2.lua_run 0 < /tmp/repo/inputs/fasta-100.txt


