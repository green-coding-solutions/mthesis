name: Lua Benchmark (Default)
author: André Brandão <https://github.com/brandao07>
description: Lua benchmarks using Lua 5.5 + LuaRocks Alpine 3.22

services:
  lua-container:
    image: nickblah/lua:5.5-luarocks-alpine3.22
    command: sleep infinity

flow:
  - name: Lua-Binary-Trees
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/binary-trees/build_in_tmp.sh
      - type: console
        command: lua /tmp/lua-build/binary-trees/binarytrees.lua-4.lua_run 21

  - name: Lua-Fannkuch-Redux
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: lua /tmp/lua-build/fannkuch-redux/fannkuchredux.lua_run 12

  - name: Lua-K-Nucleotide
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/k-nucleotide/build_in_tmp.sh
      - type: console
        command: sh -c "lua /tmp/lua-build/k-nucleotide/knucleotide.lua-2.lua_run 0 < /tmp/repo/inputs/fasta-2500000.txt"

  - name: Lua-N-Body
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/n-body/build_in_tmp.sh
      - type: console
        command: lua /tmp/lua-build/n-body/nbody.lua-2.lua_run 50000000

  - name: Lua-Regex-Redux
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/regex-redux/build_in_tmp.sh
      - type: console
        command: sh -c "lua /tmp/lua-build/regex-redux/regexredux.lua_run 0 < /tmp/repo/inputs/fasta-2500000.txt"

  - name: Lua-Spectral-Norm
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/spectral-norm/build_in_tmp.sh
      - type: console
        command: lua /tmp/lua-build/spectral-norm/spectralnorm.lua-7.lua_run 5500
