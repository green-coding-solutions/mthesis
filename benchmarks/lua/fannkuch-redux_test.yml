name: Lua Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Lua benchmarks using Lua 5.5 + LuaRocks Alpine 3.22

services:
  lua-container:
    image: nickblah/lua:5.5-luarocks-alpine3.22
    command: sleep infinity

flow:
  - name: Lua-Fannkuch-Redux
    container: lua-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/lua/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: lua /tmp/lua-build/fannkuch-redux/fannkuchredux.lua_run 6


