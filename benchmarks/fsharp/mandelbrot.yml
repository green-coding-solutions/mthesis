name: FSharp Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: FSharp mandelbrot benchmark using .NET SDK 9.0

services:
  fsharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    command: sleep infinity

flow:
  - name: FSharp-Mandelbrot
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/mandelbrot/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-mandelbrot 16000
