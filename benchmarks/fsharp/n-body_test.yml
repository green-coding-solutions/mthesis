name: FSharp Benchmark (N-Body)
author: André Brandão <https://github.com/brandao07>
description: FSharp benchmarks using .NET SDK 9.0

services:
  fsharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    setup-commands:
      - command: sh /tmp/repo/benchmarks/fsharp/setup_dependencies.sh
    command: sleep infinity

flow:
  - name: FSharp-N-Body
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/n-body/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-n-body 500


