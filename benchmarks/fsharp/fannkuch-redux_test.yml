name: FSharp Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: FSharp benchmarks using .NET SDK 9.0

services:
  fsharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    setup-commands:
      - command: sh /tmp/repo/benchmarks/fsharp/setup_dependencies.sh
    command: sleep infinity

flow:
  - name: FSharp-Fannkuch-Redux
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-fannkuch-redux 6


