name: FSharp Benchmark (Default)
author: André Brandão <https://github.com/brandao07>
description: FSharp benchmarks using .NET SDK 9.0

services:
  fsharp-container:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    setup-commands:
      - command: sh /tmp/repo/benchmarks/fsharp/setup_dependencies.sh
    command: sleep infinity

flow:
  - name: FSharp-Binary-Trees
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/binary-trees/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-binary-trees 21

  - name: FSharp-Fannkuch-Redux
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-fannkuch-redux 12

  - name: FSharp-K-Nucleotide
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/k-nucleotide/build_in_tmp.sh
      - type: console
        command: sh -c "/tmp/fsharp-k-nucleotide < /tmp/repo/inputs/fasta-2500000.txt"

  - name: FSharp-N-Body
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/n-body/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-n-body 500

  - name: FSharp-Spectral-Norm
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/spectral-norm/build_in_tmp.sh
      - type: console
        command: /tmp/fsharp-spectral-norm 5500

  - name: FSharp-Regex-Redux
    container: fsharp-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/fsharp/regex-redux/build_in_tmp.sh
      - type: console
        command: sh -c "/tmp/fsharp-regex-redux 0 < /tmp/repo/inputs/fasta-5000000.txt"
