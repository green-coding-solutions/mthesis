name: Ruby Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Ruby benchmarks using Ruby 3.4 with YJIT

services:
  ruby-container:
    image: ruby:3.4
    command: sleep infinity

flow:
  - name: Ruby-Fannkuch-Redux
    container: ruby-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/ruby/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: /tmp/ruby-fannkuch-redux 6


