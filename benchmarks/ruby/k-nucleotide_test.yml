name: Ruby Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Ruby benchmarks using Ruby 3.4 with YJIT

services:
  ruby-container:
    image: ruby:3.4
    setup-commands:
      - command: sh /tmp/repo/benchmarks/ruby/k-nucleotide/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Ruby-K-Nucleotide
    container: ruby-container
    commands:
      - type: console
        shell: sh
        command: /tmp/ruby-k-nucleotide < /tmp/repo/inputs/fasta-100.txt


