name: Ruby Benchmark (Binary-Trees)
author: André Brandão <https://github.com/brandao07>
description: Ruby benchmarks using Ruby 3.4 with YJIT

services:
  ruby-container:
    image: ruby:3.4
    setup-commands:
      - command: sh /tmp/repo/benchmarks/ruby/binary-trees/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Ruby-Binary-Trees
    container: ruby-container
    commands:
      - type: console
        command: /tmp/ruby-binary-trees 21


