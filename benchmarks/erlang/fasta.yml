name: Erlang Benchmark (Fasta)
author: André Brandão <https://github.com/brandao07>
description: Erlang benchmarks using Erlang 28.1.0.0 Alpine

services:
  erlang-container:
    image: erlang:28.1.0.0-alpine
    command: sleep infinity

flow:
  - name: Erlang-Fasta
    container: erlang-container
    commands:
      - type: console
        command: sh -c "erlc /tmp/repo/benchmarks/erlang/fasta/fasta.erl && erl -pa /tmp/repo/benchmarks/erlang/fasta -noshell -smp enable -run fasta main 25000000"
