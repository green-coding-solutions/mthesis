name: Erlang Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Erlang benchmarks using Erlang OTP 29.0.0

services:
  erlang-container:
    image: erlang:29.0.0
    setup-commands:
      - command: erlc /tmp/repo/benchmarks/erlang/fannkuch-redux/fannkuchredux.erl
    command: sleep infinity

flow:
  - name: Erlang-Fannkuch-Redux
    container: erlang-container
    commands:
      - type: console
        command: erl -pa /tmp/repo/benchmarks/erlang/fannkuch-redux -noshell -smp enable -run fannkuchredux main 12
