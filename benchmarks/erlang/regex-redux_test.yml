name: Erlang Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Erlang benchmarks using Erlang OTP 29.0.0

services:
  erlang-container:
    image: erlang:29.0.0
    command: sleep infinity

flow:
  - name: Erlang-Regex-Redux
    container: erlang-container
    commands:
      - type: console
        command: erlc /tmp/repo/benchmarks/erlang/regex-redux/regexredux.erl
      - type: console
        shell: sh
        command: erl -pa /tmp/repo/benchmarks/erlang/regex-redux -noshell -smp enable -run regexredux main dummy < /tmp/repo/inputs/fasta-100.txt
