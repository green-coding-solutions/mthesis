name: Erlang Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: Erlang benchmarks using Erlang OTP 29.0.0

services:
  erlang-container:
    image: erlang:29.0.0
    command: sleep infinity

flow:
  - name: Erlang-Mandelbrot
    container: erlang-container
    commands:
      - type: console
        command: erlc /tmp/repo/benchmarks/erlang/mandelbrot/mandelbrot.erl
      - type: console
        command: erl -pa /tmp/repo/benchmarks/erlang/mandelbrot -noshell -smp enable -run mandelbrot main 16000
