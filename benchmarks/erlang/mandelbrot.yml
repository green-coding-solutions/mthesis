name: Erlang Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: Erlang benchmarks using Erlang 28.1.0.0 Alpine

services:
  erlang-container:
    image: erlang:28.1.0.0-alpine
    command: sleep infinity

flow:
  - name: Erlang-Mandelbrot
    container: erlang-container
    commands:
      - type: console
        command: sh -c "erlc /tmp/repo/benchmarks/erlang/mandelbrot/mandelbrot.erl && erl -pa /tmp/repo/benchmarks/erlang/mandelbrot -noshell -smp enable -run mandelbrot main 16000"
