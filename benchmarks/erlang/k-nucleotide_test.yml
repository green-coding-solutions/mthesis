name: Erlang Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Erlang benchmarks using Erlang OTP 29.0.0

services:
  erlang-container:
    image: erlang:29.0.0
    setup-commands:
      - command: erlc /tmp/repo/benchmarks/erlang/k-nucleotide/knucleotide.erl
    command: sleep infinity

flow:
  - name: Erlang-K-Nucleotide
    container: erlang-container
    commands:
      - type: console
        shell: sh
        command: erl -pa /tmp/repo/benchmarks/erlang/k-nucleotide -noshell -smp enable -run knucleotide main dummy < /tmp/repo/inputs/fasta-100.txt
