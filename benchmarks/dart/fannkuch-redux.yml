name: Dart Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Dart benchmarks using Dart SDK 3.9.4

services:
  dart-container:
    image: dart:3.9.4-sdk
    command: sleep infinity

flow:
  - name: Dart-Fannkuch-Redux
    container: dart-container
    commands:
      - type: console
        command: dart compile exe /tmp/repo/benchmarks/dart/fannkuch-redux/main.dart -o /tmp/main
      - type: console
        command: /tmp/main 12


