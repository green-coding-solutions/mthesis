name: Dart Benchmark (N-Body)
author: André Brandão <https://github.com/brandao07>
description: Dart benchmarks using Dart SDK 3.9.4

services:
  dart-container:
    image: dart:3.9.4-sdk
    setup-commands:
      - command: dart compile exe /tmp/repo/benchmarks/dart/n-body/main.dart -o /tmp/main
    command: sleep infinity

flow:
  - name: Dart-N-Body
    container: dart-container
    commands:
      - type: console
        command: /tmp/main 500


