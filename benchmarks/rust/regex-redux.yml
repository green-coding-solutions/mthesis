name: Rust Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Rust benchmarks using Rust 1.93 Alpine

services:
  rust-container:
    image: rust:1.93-alpine
    setup-commands:
      - shell: sh
        command: apk add --no-cache rust cargo
      - shell: sh
        command: mkdir -p /tmp/rust-prefetch/regex-redux && cp /tmp/repo/benchmarks/rust/regex-redux/Cargo.toml /tmp/rust-prefetch/regex-redux/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo fetch --manifest-path /tmp/rust-prefetch/regex-redux/Cargo.toml
    command: sleep infinity

flow:
  - name: Rust-Regex-Redux
    container: rust-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/rust/regex-redux/build_in_tmp.sh
      - type: console
        shell: sh
        command: /tmp/rust-regex-redux < /tmp/repo/inputs/fasta-5000000.txt


