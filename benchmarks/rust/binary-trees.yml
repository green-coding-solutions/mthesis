name: Rust Benchmark (Binary-Trees)
author: André Brandão <https://github.com/brandao07>
description: Rust benchmarks using Rust 1.93 Alpine

services:
  rust-container:
    image: rust:1.93-alpine
    setup-commands:
      - shell: sh
        command: apk add --no-cache rust cargo
      - shell: sh
        command: mkdir -p /tmp/rust-prefetch/binary-trees && cp /tmp/repo/benchmarks/rust/binary-trees/Cargo.toml /tmp/rust-prefetch/binary-trees/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo generate-lockfile --manifest-path /tmp/rust-prefetch/binary-trees/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo fetch --locked --manifest-path /tmp/rust-prefetch/binary-trees/Cargo.toml
      - command: sh /tmp/repo/benchmarks/rust/binary-trees/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Rust-Binary-Trees
    container: rust-container
    commands:
      - type: console
        command: /tmp/cargo-target/binary-trees/release/binary-trees 21


