name: Rust Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Rust benchmarks using Rust 1.93 Alpine

services:
  rust-container:
    image: rust:1.93-alpine
    setup-commands:
      - shell: sh
        command: apk add --no-cache rust cargo
      - shell: sh
        command: mkdir -p /tmp/rust-prefetch/k-nucleotide && cp /tmp/repo/benchmarks/rust/k-nucleotide/Cargo.toml /tmp/rust-prefetch/k-nucleotide/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo generate-lockfile --manifest-path /tmp/rust-prefetch/k-nucleotide/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo fetch --locked --manifest-path /tmp/rust-prefetch/k-nucleotide/Cargo.toml
      - command: sh /tmp/repo/benchmarks/rust/k-nucleotide/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Rust-K-Nucleotide
    container: rust-container
    commands:
      - type: console
        shell: sh
        command: /tmp/rust-k-nucleotide < /tmp/repo/inputs/fasta-100.txt


