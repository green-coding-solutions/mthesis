name: Rust Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Rust benchmarks using Rust 1.93 Alpine

services:
  rust-container:
    image: rust:1.93-alpine
    setup-commands:
      - shell: sh
        command: apk add --no-cache rust cargo
      - shell: sh
        command: mkdir -p /tmp/rust-prefetch/fannkuch-redux && cp /tmp/repo/benchmarks/rust/fannkuch-redux/Cargo.toml /tmp/rust-prefetch/fannkuch-redux/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo generate-lockfile --manifest-path /tmp/rust-prefetch/fannkuch-redux/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo fetch --locked --manifest-path /tmp/rust-prefetch/fannkuch-redux/Cargo.toml
      - command: sh /tmp/repo/benchmarks/rust/fannkuch-redux/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Rust-Fannkuch-Redux
    container: rust-container
    commands:
      - type: console
        command: /tmp/cargo-target/fannkuch-redux/release/fannkuch-redux 12


