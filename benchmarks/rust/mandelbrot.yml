name: Rust Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: Rust benchmarks using Rust 1.93 Alpine

services:
  rust-container:
    image: rust:1.93-alpine
    setup-commands:
      - command: sh -lc "CARGO_HOME=/tmp/cargo-home cargo fetch --manifest-path /tmp/repo/benchmarks/rust/mandelbrot/Cargo.toml"
    command: sleep infinity

flow:
  - name: Rust-Mandelbrot
    container: rust-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/rust/mandelbrot/build_in_tmp.sh
      - type: console
        command: /tmp/rust-mandelbrot 16000
