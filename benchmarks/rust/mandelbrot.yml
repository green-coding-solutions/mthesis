name: Rust Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: Rust benchmarks using Rust 1.93 Alpine

services:
  rust-container:
    image: rust:1.93-alpine
    setup-commands:
      - shell: sh
        command: apk add --no-cache rust cargo
      - shell: sh
        command: mkdir -p /tmp/rust-prefetch/mandelbrot && cp /tmp/repo/benchmarks/rust/mandelbrot/Cargo.toml /tmp/rust-prefetch/mandelbrot/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo generate-lockfile --manifest-path /tmp/rust-prefetch/mandelbrot/Cargo.toml && CARGO_HOME=/tmp/cargo-home cargo fetch --locked --manifest-path /tmp/rust-prefetch/mandelbrot/Cargo.toml
      - command: sh /tmp/repo/benchmarks/rust/mandelbrot/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: Rust-Mandelbrot
    container: rust-container
    commands:
      - type: console
        command: /tmp/rust-mandelbrot 16000
