name: Java Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Java benchmarks using GraalVM Native Image 23.0.2

services:
  java-container:
    image: ghcr.io/graalvm/native-image-community:23.0.2
    entrypoint: /bin/sh
    command: -c "sleep infinity"

flow:
  - name: Java-Regex-Redux
    container: java-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/java/regex-redux/build_in_tmp.sh
      - type: console
        shell: sh
        command: /tmp/java-build/regex-redux/regexredux.graalvmaot-3.graalvmaot_run 0 < /tmp/repo/inputs/fasta-100.txt


