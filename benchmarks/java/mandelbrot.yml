name: Java Benchmark (Mandelbrot)
author: André Brandão <https://github.com/brandao07>
description: Java Mandelbrot benchmark using GraalVM Native Image 23.0.2

services:
  java-container:
    image: ghcr.io/graalvm/native-image-community:23.0.2
    entrypoint: /bin/sh
    command: -c "sleep infinity"

flow:
  - name: Java-Mandelbrot
    container: java-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/java/mandelbrot/build_in_tmp.sh
      - type: console
        command: /tmp/java-build/mandelbrot/mandelbrot.graalvmaot-6.graalvmaot_run 16000
