name: Java Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: Java benchmarks using GraalVM Native Image 23.0.2

services:
  java-container:
    image: ghcr.io/graalvm/native-image-community:23.0.2
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]

flow:
  - name: Java-Spectral-Norm
    container: java-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/java/spectral-norm/build_in_tmp.sh
      - type: console
        command: /tmp/java-build/spectral-norm/spectralnorm.graalvmaot-3.graalvmaot_run 5500

