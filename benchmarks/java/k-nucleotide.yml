name: Java Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Java benchmarks using GraalVM Native Image 23.0.2

services:
  java-container:
    image: ghcr.io/graalvm/native-image-community:23.0.2
    entrypoint: /bin/sh
    setup-commands:
      - command: sh -lc "mkdir -p /tmp/java-libs && if [ ! -f /tmp/java-libs/fastutil-8.3.1.jar ]; then if command -v curl >/dev/null 2>&1; then curl -fsSL -o /tmp/java-libs/fastutil-8.3.1.jar https://repo1.maven.org/maven2/it/unimi/dsi/fastutil/8.3.1/fastutil-8.3.1.jar; elif command -v wget >/dev/null 2>&1; then wget -q -O /tmp/java-libs/fastutil-8.3.1.jar https://repo1.maven.org/maven2/it/unimi/dsi/fastutil/8.3.1/fastutil-8.3.1.jar; else echo 'Neither curl nor wget is available to download fastutil jar.' >&2; exit 1; fi; fi"
    command: -c "sleep infinity"

flow:
  - name: Java-K-Nucleotide
    container: java-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/java/k-nucleotide/build_in_tmp.sh
      - type: console
        command: sh -c "/tmp/java-build/k-nucleotide/knucleotide.graalvmaot_run 0 < /tmp/repo/inputs/fasta-2500000.txt"

