name: Java Benchmark (Fannkuch-Redux)
author: André Brandão <https://github.com/brandao07>
description: Java benchmarks using GraalVM Native Image 23.0.2

services:
  java-container:
    image: ghcr.io/graalvm/native-image-community:23.0.2
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]

flow:
  - name: Java-Fannkuch-Redux
    container: java-container
    commands:
      - type: console
        command: sh /tmp/repo/benchmarks/java/fannkuch-redux/build_in_tmp.sh
      - type: console
        command: /tmp/java-build/fannkuch-redux/fannkuchredux.graalvmaot_run 6


