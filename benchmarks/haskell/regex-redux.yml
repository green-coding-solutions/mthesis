name: Haskell Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Haskell benchmarks using GHC 9.10.1

services:
  haskell-container:
    image: haskell:9.10.1
    setup-commands:
      - command: bash -c "apt-get update && apt-get install -y --no-install-recommends libpcre2-dev wget xz-utils && rm -rf /var/lib/apt/lists/*"
      - command: bash -c "cabal update && cabal install --lib parallel ghc-compact hashable hashtables massiv vector containers bytestring"
    command: sleep infinity

flow:
  - name: Haskell-Regex-Redux
    container: haskell-container
    commands:
      - type: console
        command: sh -c "mkdir -p /tmp/haskell-regex-redux && ghc -O2 -XBangPatterns -threaded -rtsopts -XForeignFunctionInterface -XCApiFFI -optc \"-DPCRE2_CODE_UNIT_WIDTH=8\" /tmp/repo/benchmarks/haskell/regex-redux/main.hs -outputdir /tmp/haskell-regex-redux -odir /tmp/haskell-regex-redux -hidir /tmp/haskell-regex-redux -o /tmp/haskell-regex-redux/main -lpcre2-8"
      - type: console
        command: sh -c "/tmp/haskell-regex-redux/main +RTS -N4 -H250M -RTS 0 < /tmp/repo/inputs/fasta-5000000.txt"


