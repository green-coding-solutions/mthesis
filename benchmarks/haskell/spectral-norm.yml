name: Haskell Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: Haskell benchmarks using GHC 9.10.1

services:
  haskell-container:
    image: haskell:9.10.1
    setup-commands:
      - shell: bash
        command: apt-get update && apt-get install -y --no-install-recommends libpcre2-dev && rm -rf /var/lib/apt/lists/*
      - shell: sh
        command: mkdir -p /tmp/haskell-spectral-norm && ghc -O2 -XBangPatterns -threaded -rtsopts -XMagicHash /tmp/repo/benchmarks/haskell/spectral-norm/main.hs -outputdir /tmp/haskell-spectral-norm -odir /tmp/haskell-spectral-norm -hidir /tmp/haskell-spectral-norm -o /tmp/haskell-spectral-norm/main
    command: sleep infinity

flow:
  - name: Haskell-Spectral-Norm
    container: haskell-container
    commands:
      - type: console
        command: /tmp/haskell-spectral-norm/main +RTS -N4 -RTS 5500

