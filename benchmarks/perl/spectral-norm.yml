name: Perl Benchmark (Spectral-Norm)
author: André Brandão <https://github.com/brandao07>
description: Perl benchmarks using Perl 5.42.1 (threaded)

services:
  perl-container:
    image: perl:5.42.1-threaded
    command: sleep infinity

flow:
  - name: Perl-Spectral-Norm
    container: perl-container
    commands:
      - type: console
        command: perl /tmp/repo/benchmarks/perl/spectral-norm/main.pl 5500

