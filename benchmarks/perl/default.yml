name: Perl Benchmark (Default)
author: André Brandão <https://github.com/brandao07>
description: Perl benchmarks using Perl 5.42.1 (threaded)

services:
  perl-container:
    image: perl:5.42.1-threaded
    command: sleep infinity

flow:
  - name: Perl-Binary-Trees
    container: perl-container
    commands:
      - type: console
        command: perl /tmp/repo/benchmarks/perl/binary-trees/main.pl 21

  - name: Perl-Fannkuch-Redux
    container: perl-container
    commands:
      - type: console
        command: perl /tmp/repo/benchmarks/perl/fannkuch-redux/main.pl 12

  - name: Perl-K-Nucleotide
    container: perl-container
    commands:
      - type: console
        command: sh -c "perl /tmp/repo/benchmarks/perl/k-nucleotide/main.pl 0 < /tmp/repo/inputs/fasta-2500000.txt"

  - name: Perl-N-Body
    container: perl-container
    commands:
      - type: console
        command: perl /tmp/repo/benchmarks/perl/n-body/main.pl 50000000

  - name: Perl-Regex-Redux
    container: perl-container
    commands:
      - type: console
        command: sh -c "perl /tmp/repo/benchmarks/perl/regex-redux/main.pl 0 < /tmp/repo/inputs/fasta-5000000.txt"

  - name: Perl-Spectral-Norm
    container: perl-container
    commands:
      - type: console
        command: perl /tmp/repo/benchmarks/perl/spectral-norm/main.pl 5500
