name: Perl Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Perl benchmarks using Perl 5.42.1 (threaded)

services:
  perl-container:
    image: perl:5.42.1-threaded
    command: sleep infinity

flow:
  - name: Perl-Regex-Redux
    container: perl-container
    commands:
      - type: console
        shell: sh
        command: perl /tmp/repo/benchmarks/perl/regex-redux/main.pl 0 < /tmp/repo/inputs/fasta-5000000.txt


