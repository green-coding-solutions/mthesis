name: Perl Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Perl benchmarks using Perl 5.42.1 (threaded)

services:
  perl-container:
    image: perl:5.42.1-threaded
    command: sleep infinity

flow:
  - name: Perl-K-Nucleotide
    container: perl-container
    commands:
      - type: console
        shell: sh
        command: perl /tmp/repo/benchmarks/perl/k-nucleotide/main.pl 0 < /tmp/repo/inputs/fasta-2500000.txt


