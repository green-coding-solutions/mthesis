name: Python Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: Python benchmarks using Python 3.13 Alpine

services:
  python-container:
    image: python:3.13-alpine3.22
    command: sleep infinity

flow:
  - name: Python-K-Nucleotide
    container: python-container
    commands:
      - type: console
        shell: sh
        command: python3 -OO /tmp/repo/benchmarks/python/k-nucleotide/main.py 0 < /tmp/repo/inputs/fasta-2500000.txt


