name: Python Benchmark (Fasta)
author: André Brandão <https://github.com/brandao07>
description: Python benchmarks using Python 3.13 Alpine

services:
  python-container:
    image: python:3.13-alpine3.22
    command: sleep infinity

flow:
  - name: Python-Fasta
    container: python-container
    commands:
      - type: console
        command: python3 -OO /tmp/repo/benchmarks/python/fasta/main.py 100
