name: Python Benchmark (Regex-Redux)
author: André Brandão <https://github.com/brandao07>
description: Python benchmarks using Python 3.14 Alpine

services:
  python-container:
    image: python:3.14.0-alpine3.22
    command: sleep infinity

flow:
  - name: Python-Regex-Redux
    container: python-container
    commands:
      - type: console
        command: sh -c "python3 -OO /tmp/repo/benchmarks/python/regex-redux/main.py 0 < /tmp/repo/inputs/fasta-5000000.txt"


