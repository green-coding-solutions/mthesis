name: PHP Benchmark (K-Nucleotide)
author: André Brandão <https://github.com/brandao07>
description: PHP benchmarks using PHP CLI

services:
  php-container:
    image: php:8.4-cli
    setup-commands:
      - shell: sh
        command: docker-php-ext-install -j"$(nproc)" shmop pcntl sysvmsg && docker-php-ext-enable shmop pcntl sysvmsg
      - command: sh /tmp/repo/benchmarks/php/k-nucleotide/build_in_tmp.sh
    command: sleep infinity

flow:
  - name: PHP-K-Nucleotide
    container: php-container
    commands:
      - type: console
        shell: sh
        command: /tmp/php-k-nucleotide < /tmp/repo/inputs/fasta-2500000.txt


